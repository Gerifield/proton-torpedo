<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Server List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="mb-4">VPN Servers</h1>
    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th scope="col">VPN</th>
                <th scope="col">Country</th>
                <th scope="col">City</th>
                <th scope="col">Server Name</th>
                <th scope="col">Hostname</th>
                <th scope="col">TCP</th>
                <th scope="col">UDP</th>
                <th scope="col">Stream</th>
                <th scope="col">Port Forward</th>
                <th scope="col">IPs</th>
                <th scope="col">Action</th>
            </tr>
            </thead>
            <tbody id="server-table-body">
            </tbody>
        </table>
    </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/list')
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        return response.json();
      })
      .then(data => {
        const tableBody = document.getElementById('server-table-body');
        data.forEach(server => {
          const row = document.createElement('tr');
          row.innerHTML = `
                            <td>${server.vpn}</td>
                            <td>${server.country}</td>
                            <td>${server.city}</td>
                            <td>${server.server_name}</td>
                            <td>${server.hostname}</td>
                            <td>${server.tcp ? '✅' : '❌'}</td>
                            <td>${server.udp ? '✅' : '❌'}</td>
                            <td>${server.stream ? '✅' : '❌'}</td>
                            <td>${server.port_forward ? '✅' : '❌'}</td>
                            <td>${server.ips.join(', ')}</td>
                            <td><button class="btn btn-primary btn-sm connect-btn" data-server-name="${server.server_name}">Connect</button></td>
                        `;
          tableBody.appendChild(row);
        });
      })
      .catch(error => {
        console.error('There was a problem with the fetch operation:', error);
        const tableBody = document.getElementById('server-table-body');
        tableBody.innerHTML = `<tr><td colspan="11" class="text-danger text-center">Failed to load server data. Please check the network connection.</td></tr>`;
      });
  });

  // Event listener for the "Connect" buttons
  document.addEventListener('click', function(event) {
    if (event.target.classList.contains('connect-btn')) {
      const serverName = event.target.getAttribute('data-server-name');
      const button = event.target;
      button.disabled = true;
      button.textContent = 'Connecting...';

      fetch('/api/connect', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ server_name: serverName }),
      })
        .then(response => {
          if (!response.ok) {
            throw new Error('Failed to connect to the server');
          }
          return response.json();
        })
        .then(data => {
          console.log('Success:', data);
          button.textContent = 'Connected ✅';
          button.classList.remove('btn-primary');
          button.classList.add('btn-success');
        })
        .catch((error) => {
          console.error('Error:', error);
          button.textContent = 'Failed ❌';
          button.classList.remove('btn-primary');
          button.classList.add('btn-danger');
        })
        .finally(() => {
          setTimeout(() => {
            button.disabled = false;
            button.textContent = 'Connect';
            button.classList.remove('btn-success', 'btn-danger');
            button.classList.add('btn-primary');
          }, 3000);
        });
    }
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
