<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Server List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { margin-top: 20px; }
        #log-box {
            height: 220px;
            overflow-y: auto;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: monospace;
            font-size: 0.78rem;
            padding: 10px;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #log-box .log-line { display: block; }
        tr.active-row { background-color: #d1fae5 !important; }
        thead .filter-row th { background-color: #f8f9fa; padding: 4px; }
        thead .filter-row input,
        thead .filter-row select {
            font-size: 0.8rem;
            padding: 2px 4px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2>Your IP Information</h2>
    <div id="ip-info-card" class="card">
        <div class="card-body">
            <p><strong>IP:</strong> <span id="ip-address">Loading...</span></p>
            <p><strong>Country:</strong> <span id="ip-country">Loading...</span></p>
            <p><strong>Organization:</strong> <span id="ip-org">Loading...</span></p>
            <p><strong>Region:</strong> <span id="ip-region">Loading...</span></p>
            <p><strong>City:</strong> <span id="ip-city">Loading...</span></p>
            <button id="refresh-ip-btn" class="btn btn-primary mt-3">Refresh IP</button>
        </div>
    </div>
</div>

<div class="container mt-4">
    <h2>Connection Log
        <span id="conn-badge" class="badge bg-secondary ms-2">Unknown</span>
        <button id="disconnect-btn" class="btn btn-danger btn-sm ms-2" disabled>Disconnect</button>
    </h2>
    <div id="log-box"></div>
</div>

<div class="container mt-4">
    <h1 class="mb-4">VPN Servers</h1>
    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th scope="col">VPN</th>
                <th scope="col">Country</th>
                <th scope="col">City</th>
                <th scope="col">Server Name</th>
                <th scope="col">Hostname</th>
                <th scope="col">TCP</th>
                <th scope="col">UDP</th>
                <th scope="col">Stream</th>
                <th scope="col">Port Forward</th>
                <th scope="col">IPs</th>
                <th scope="col">Action</th>
            </tr>
            <tr class="filter-row">
                <th><input type="text" data-filter="text" data-field="vpn" placeholder="filter..."></th>
                <th><input type="text" data-filter="text" data-field="country" placeholder="filter..."></th>
                <th><input type="text" data-filter="text" data-field="city" placeholder="filter..."></th>
                <th><input type="text" data-filter="text" data-field="server_name" placeholder="filter..."></th>
                <th><input type="text" data-filter="text" data-field="hostname" placeholder="filter..."></th>
                <th><select data-filter="bool" data-field="tcp"><option value="">All</option><option value="true">✅</option><option value="false">❌</option></select></th>
                <th><select data-filter="bool" data-field="udp"><option value="">All</option><option value="true">✅</option><option value="false">❌</option></select></th>
                <th><select data-filter="bool" data-field="stream"><option value="">All</option><option value="true">✅</option><option value="false">❌</option></select></th>
                <th><select data-filter="bool" data-field="port_forward"><option value="">All</option><option value="true">✅</option><option value="false">❌</option></select></th>
                <th><input type="text" data-filter="text" data-field="ips" placeholder="filter..."></th>
                <th><button id="clear-filters-btn" class="btn btn-outline-light btn-sm" type="button">Clear</button></th>
            </tr>
            </thead>
            <tbody id="server-table-body">
            </tbody>
        </table>
    </div>
</div>

<script>
  let activeServerName = '';
  let allServers = [];

  // --- Status badge ---
  function fetchStatus() {
    fetch('/api/status')
      .then(r => r.json())
      .then(data => {
        activeServerName = data.server_name || '';
        const badge = document.getElementById('conn-badge');
        const disconnectBtn = document.getElementById('disconnect-btn');
        if (data.connected && activeServerName) {
          badge.className = 'badge bg-success ms-2';
          badge.textContent = 'Connected: ' + activeServerName;
          disconnectBtn.disabled = false;
        } else {
          badge.className = 'badge bg-secondary ms-2';
          badge.textContent = 'Not connected';
          disconnectBtn.disabled = true;
        }
        highlightActiveRow();
      })
      .catch(() => {});
  }

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('disconnect-btn').addEventListener('click', function() {
      const btn = this;
      btn.disabled = true;
      btn.textContent = 'Disconnecting...';
      fetch('/api/disconnect', { method: 'POST' })
        .then(r => { if (!r.ok) throw new Error('Failed'); return r.json(); })
        .catch(() => {})
        .finally(() => {
          btn.textContent = 'Disconnect';
          fetchStatus();
        });
    });
  });

  function highlightActiveRow() {
    document.querySelectorAll('#server-table-body tr').forEach(row => {
      const btn = row.querySelector('.connect-btn');
      if (!btn) return;
      const name = btn.getAttribute('data-server-name');
      row.classList.toggle('active-row', name === activeServerName);
    });
  }

  // --- Live log streaming via SSE ---
  function startLogStream() {
    const box = document.getElementById('log-box');
    const es = new EventSource('/api/logs');
    es.onmessage = function(e) {
      const line = document.createElement('span');
      line.className = 'log-line';
      line.textContent = e.data;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    };
    es.onerror = function() {
      // Reconnect automatically (browser handles this for EventSource)
    };
  }

  // --- Server list ---
  document.addEventListener('DOMContentLoaded', function() {
    fetchStatus();
    startLogStream();
    setInterval(fetchStatus, 5000);

    fetch('/api/list')
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(data => {
        allServers = data || [];
        renderServerTable();
      })
      .catch(error => {
        console.error('Failed to load servers:', error);
        const tableBody = document.getElementById('server-table-body');
        tableBody.innerHTML = `<tr><td colspan="11" class="text-danger text-center">Failed to load server data. Please check the network connection.</td></tr>`;
      });

    document.querySelectorAll('.filter-row [data-filter]').forEach(el => {
      const evt = el.tagName === 'SELECT' ? 'change' : 'input';
      el.addEventListener(evt, renderServerTable);
    });

    document.getElementById('clear-filters-btn').addEventListener('click', function() {
      document.querySelectorAll('.filter-row [data-filter]').forEach(el => { el.value = ''; });
      renderServerTable();
    });
  });

  function getFilters() {
    const filters = [];
    document.querySelectorAll('.filter-row [data-filter]').forEach(el => {
      const value = el.value;
      if (value === '') return;
      filters.push({ type: el.dataset.filter, field: el.dataset.field, value });
    });
    return filters;
  }

  function serverMatches(server, filters) {
    return filters.every(f => {
      const fieldValue = server[f.field];
      if (f.type === 'bool') return String(!!fieldValue) === f.value;
      if (f.type === 'select') return String(fieldValue) === f.value;
      const haystack = Array.isArray(fieldValue) ? fieldValue.join(', ') : String(fieldValue ?? '');
      return haystack.toLowerCase().includes(f.value.toLowerCase());
    });
  }

  function renderServerTable() {
    const tableBody = document.getElementById('server-table-body');
    const filters = getFilters();
    const filtered = allServers.filter(s => serverMatches(s, filters));
    tableBody.innerHTML = '';
    if (filtered.length === 0) {
      tableBody.innerHTML = `<tr><td colspan="11" class="text-muted text-center">No servers match the current filters.</td></tr>`;
      return;
    }
    filtered.forEach(server => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${server.vpn}</td>
        <td>${server.country}</td>
        <td>${server.city}</td>
        <td>${server.server_name}</td>
        <td>${server.hostname}</td>
        <td>${server.tcp ? '✅' : '❌'}</td>
        <td>${server.udp ? '✅' : '❌'}</td>
        <td>${server.stream ? '✅' : '❌'}</td>
        <td>${server.port_forward ? '✅' : '❌'}</td>
        <td>${server.ips.join(', ')}</td>
        <td><button class="btn btn-primary btn-sm connect-btn" data-server-name="${server.server_name}">Connect</button></td>
      `;
      tableBody.appendChild(row);
    });
    highlightActiveRow();
  }

  // --- Connect button ---
  document.addEventListener('click', function(event) {
    if (!event.target.classList.contains('connect-btn')) return;

    const serverName = event.target.getAttribute('data-server-name');
    const button = event.target;
    button.disabled = true;
    button.textContent = 'Connecting...';

    fetch('/api/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ server_name: serverName }),
    })
      .then(response => {
        if (!response.ok) throw new Error('Failed to connect');
        return response.json();
      })
      .then(() => {
        button.textContent = 'Connected ✅';
        button.classList.replace('btn-primary', 'btn-success');
        fetchStatus();
      })
      .catch(() => {
        button.textContent = 'Failed ❌';
        button.classList.replace('btn-primary', 'btn-danger');
      })
      .finally(() => {
        setTimeout(() => {
          button.disabled = false;
          button.textContent = 'Connect';
          button.classList.remove('btn-success', 'btn-danger');
          button.classList.add('btn-primary');
        }, 3000);
      });
  });

  // --- IP info ---
  function fetchIpInfo() {
    fetch('/api/ip')
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(data => {
        document.getElementById('ip-address').textContent = data.ip;
        document.getElementById('ip-country').textContent = data.country;
        document.getElementById('ip-org').textContent = data.org;
        document.getElementById('ip-region').textContent = data.region;
        document.getElementById('ip-city').textContent = data.city;
      })
      .catch(() => {
        ['ip-address','ip-country','ip-org','ip-region','ip-city'].forEach(id => {
          document.getElementById(id).textContent = 'Error';
        });
      });
  }

  document.addEventListener('DOMContentLoaded', fetchIpInfo);

  document.getElementById('refresh-ip-btn').addEventListener('click', function() {
    ['ip-address','ip-country','ip-org','ip-region','ip-city'].forEach(id => {
      document.getElementById(id).textContent = 'Loading...';
    });
    fetchIpInfo();
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
